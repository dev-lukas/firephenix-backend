name: FirePhenix Backend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy to production after pushing the image
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  backend:
    uses: dev-lukas/ci-cd-actions/.github/workflows/python-service.yml@main
    with:
      image_name: firephenix-backend
      python_version: "3.12"
      container_port: "5000"
      container_test_command: python3 -m unittest discover -s tests
      smoke_paths: |
        /api/auth/check
    secrets: inherit

  integration:
    needs: backend
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    uses: dev-lukas/ci-cd-actions/.github/workflows/firephenix-stack.yml@main
    with:
      component: backend
      image_name: firephenix-backend
    secrets: inherit

  deploy:
    needs: integration
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy == true }}
    uses: dev-lukas/ci-cd-actions/.github/workflows/deploy-service.yml@main
    with:
      deploy_services: "backend bot"
    secrets: inherit
